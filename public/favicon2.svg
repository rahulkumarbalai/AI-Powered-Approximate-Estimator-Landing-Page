    <path d="M 120 360 L 180 152 L 240 360" fill="none" stroke="url(#brand)" stroke-width="48" stroke-linecap="round" stroke-linejoin="round"/>
    <path d="M 145 280 L 215 280" fill="none" stroke="url(#brand)" stroke-width="48" stroke-linecap="round"/>
    
    <path d="M 280 152 L 280 360 M 280 152 L 360 152 M 280 256 L 340 256 M 280 360 L 360 360" fill="none" stroke="url(#brand)" stroke-width="48" stroke-linecap="round" stroke-linejoin="round"/>
    
    <circle cx="400" cy="360" r="28" fill="url(#accent)"/>
    
  </g>
</svg>
