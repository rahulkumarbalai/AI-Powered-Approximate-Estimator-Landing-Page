<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 512 512">
  <defs>
    <linearGradient id="bg" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#0f172a"/>
      <stop offset="100%" stop-color="#020617"/>
    </linearGradient>
    
    <linearGradient id="brand" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#38bdf8"/>
      <stop offset="100%" stop-color="#0284c7"/>
    </linearGradient>
    
    <linearGradient id="accent" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#34d399"/>
      <stop offset="100%" stop-color="#059669"/>
    </linearGradient>
    
    <filter id="glow" x="-30%" y="-30%" width="160%" height="160%">
      <feDropShadow dx="0" dy="8" stdDeviation="20" flood-color="#0ea5e9" flood-opacity="0.6"/>
    </filter>
  </defs>
  
  <rect width="512" height="512" rx="120" fill="url(#bg)"/>
  
  <path d="M 0 128 H 512 M 0 256 H 512 M 0 384 H 512 M 128 0 V 512 M 256 0 V 512 M 384 0 V 512" stroke="#1e293b" stroke-width="4" opacity="0.6"/>

